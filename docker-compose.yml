version: "3.9"

name: deas

# PostgreSQL = Neon.tech (external cloud). No local db container.
# Redis runs in Docker for sessions, cache, rate limiting, pub/sub.

networks:
  defence-net:
    driver: bridge

volumes:
  redis_data:
  uploads_data:
  ai_models:
  backend_logs:

services:

  # ─── Redis 7 ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: deas_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel notice
    ports:
      - "6380:6379"   # host:container — 6379 occupied on this machine
    volumes:
      - redis_data:/data
    networks:
      - defence-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Node.js Backend ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deas_backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      AI_SERVICE_URL: http://ai-service:${AI_SERVICE_PORT:-8001}
    volumes:
      - uploads_data:/app/uploads
      - backend_logs:/app/logs
      - ./backend:/app
      - /app/node_modules
    ports:
      - "${BACKEND_PORT:-5000}:${BACKEND_PORT:-5000}"
    networks:
      - defence-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT:-5000}/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Python FastAPI AI Service ────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: deas_ai
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ai_models:/app/models
      - ./ai-service:/app
    networks:
      - defence-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${AI_SERVICE_PORT:-8001}/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ─── React Web App (Vite) ─────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: deas_web
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    networks:
      - defence-net
    depends_on:
      backend:
        condition: service_healthy

  # ─── Nginx (production only) ──────────────────────────────
  # Start with: docker compose --profile production up
  nginx:
    image: nginx:1.25-alpine
    container_name: deas_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - defence-net
    depends_on:
      - backend
      - web
    profiles:
      - production
